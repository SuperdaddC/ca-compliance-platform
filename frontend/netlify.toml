[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  # VITE_ vars are set in Netlify dashboard (Site > Environment variables)
  # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_SCANNER_URL

[[redirects]]
  from = "/api/*"
  to = "https://scanner.complywithjudy.com/:splat"
  status = 200

# SPA fallback — all routes go to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
